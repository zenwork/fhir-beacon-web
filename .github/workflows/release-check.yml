name: Release Check

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: Docs release check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check public build
        run: deno task check
