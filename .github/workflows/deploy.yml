name: Preview Deploy

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: deno-deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify build
        run: deno task check

      - name: Deploy preview revision
        id: deploy
        shell: bash
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_ORG: ${{ vars.DENO_DEPLOY_ORG }}
          DENO_DEPLOY_APP: ${{ vars.DENO_DEPLOY_APP }}
        run: |
          set +e
          : "${DENO_DEPLOY_TOKEN:?DENO_DEPLOY_TOKEN is required}"
          : "${DENO_DEPLOY_ORG:?DENO_DEPLOY_ORG is required}"
          : "${DENO_DEPLOY_APP:?DENO_DEPLOY_APP is required}"

          deploy_status=1
          for attempt in 1 2 3; do
            echo "Deploy preview attempt ${attempt}/3" | tee -a deploy-preview.log
            deno deploy \
              --token "$DENO_DEPLOY_TOKEN" \
              --org "$DENO_DEPLOY_ORG" \
              --app "$DENO_DEPLOY_APP" 2>&1 | tee -a deploy-preview.log
            deploy_status="${PIPESTATUS[0]}"

            if [ "$deploy_status" -eq 0 ]; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep "$((attempt * 15))"
            fi
          done

          exit "$deploy_status"

      - name: Publish preview summary
        if: always()
        shell: bash
        env:
          DENO_DEPLOY_APP: ${{ vars.DENO_DEPLOY_APP }}
        run: |
          touch deploy-preview.log
          clean_log="$(sed -E 's/\x1b\[[0-9;]*[mK]//g' deploy-preview.log)"
          preview_urls="$(printf '%s\n' "$clean_log" | awk '
            tolower($0) ~ /^preview url:/ {
              capture_next = 1
              next
            }
            capture_next && match($0, /https:\/\/[^[:space:]]+/) {
              print substr($0, RSTART, RLENGTH)
              capture_next = 0
            }
          ' | sed -E 's#[),.;:]+$##; s#/$##' | sort -u || true)"
          trace_ids="$(printf '%s\n' "$clean_log" | grep -Eio 'trace id: [[:alnum:]]+' | sort -u || true)"

          {
            echo "## Deno Deploy Preview"
            echo
            echo "- Pull request: #${{ github.event.pull_request.number }}"
            echo "- Commit: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Deploy status: ${{ steps.deploy.outcome }}"
            echo
            if [ -n "$preview_urls" ]; then
              echo "### Preview URL"
              printf '%s\n' "$preview_urls" | sed 's/^/- /'
            else
              echo "No Deno Deploy preview URL was detected after the \`Preview url:\` line."
            fi
            if [ -n "$trace_ids" ]; then
              echo
              echo "### Deno Deploy trace ids"
              printf '%s\n' "$trace_ids" | sed 's/^/- /'
            fi
            if [ "${{ steps.deploy.outcome }}" != "success" ]; then
              echo
              echo "### Deploy log tail"
              echo '```text'
              printf '%s\n' "$clean_log" | tail -40
              echo '```'
            fi
            echo
            echo "_This workflow deploys PR preview revisions only. Production deploys run from \`release-please.yml\`._"
          } >> "$GITHUB_STEP_SUMMARY"
